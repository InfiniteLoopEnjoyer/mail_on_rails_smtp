name: Ruby

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['4.0']

    steps:
    - uses: actions/checkout@v4
    - name: Set up Ruby
      # Unpinned major so new Ruby versions and bug fixes arrive automatically
      # (https://github.com/ruby/setup-ruby#versioning) - the previously
      # pinned 2023 SHA predated Ruby 4.0 and could not install it.
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true # runs 'bundle install' and caches installed gems automatically
    - name: Run tests
      # There is no Rakefile; bin/test is the suite entrypoint.
      run: bin/test
    - name: Lint
      run: bundle exec rubocop --parallel
